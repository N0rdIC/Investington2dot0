<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barrier Signal · Paper Desk</title>
<style>
  :root {
    --bg: #0a0e12;
    --panel: #11171d;
    --panel-2: #161d25;
    --line: #232d38;
    --ink: #d4dce4;
    --dim: #6b7885;
    --long: #3fb98a;      /* green for longs */
    --short: #e8654f;     /* vermilion for shorts */
    --accent: #e2b93b;    /* amber terminal accent */
    --grid: #1a222b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "SF Mono", "JetBrains Mono", "Consolas", ui-monospace, monospace;
    font-size: 13px; line-height: 1.5;
    padding: 20px; max-width: 1200px; margin: 0 auto;
  }
  .head {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 1px solid var(--line); padding-bottom: 14px; margin-bottom: 20px;
    flex-wrap: wrap; gap: 8px;
  }
  .title { font-size: 18px; letter-spacing: 0.5px; font-weight: 600; }
  .title .blink { color: var(--accent); }
  .meta { color: var(--dim); font-size: 11px; text-align: right; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 4px; padding: 14px;
  }
  .card .label { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; }
  .card .value { font-size: 22px; margin-top: 4px; font-weight: 600; }
  .pos { color: var(--long); } .neg { color: var(--short); }
  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--accent); margin: 24px 0 10px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { color: var(--dim); text-align: right; font-weight: 500; padding: 6px 10px;
       border-bottom: 1px solid var(--line); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  th:first-child, td:first-child { text-align: left; }
  td { padding: 6px 10px; border-bottom: 1px solid var(--grid); }
  tr:hover td { background: var(--panel-2); }
  .tag { padding: 1px 7px; border-radius: 3px; font-size: 10px; font-weight: 600;
         text-transform: uppercase; letter-spacing: 0.5px; }
  .tag.long { background: rgba(63,185,138,0.15); color: var(--long); }
  .tag.short { background: rgba(232,101,79,0.15); color: var(--short); }
  .tag.profit { background: rgba(63,185,138,0.12); color: var(--long); }
  .tag.stop { background: rgba(232,101,79,0.12); color: var(--short); }
  .tag.time { background: rgba(107,120,133,0.15); color: var(--dim); }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 820px) { .grid { grid-template-columns: repeat(2,1fr); } .cols { grid-template-columns: 1fr; } }
  #chart { width: 100%; height: 220px; display: block; }
  .barbadge { font-size: 11px; color: var(--dim); }
  .empty { color: var(--dim); padding: 20px; text-align: center; }
  .foot { color: var(--dim); font-size: 10px; margin-top: 30px; border-top: 1px solid var(--line);
          padding-top: 12px; line-height: 1.7; }
  .pnum { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="head">
    <div>
      <div class="title">BARRIER SIGNAL <span class="blink">▮</span> PAPER DESK</div>
      <div class="barbadge" id="barrier">—</div>
    </div>
    <div class="meta" id="meta">loading…</div>
  </div>

  <div class="grid" id="kpis"></div>

  <div class="section-title">Equity (virtual, realistic fills)</div>
  <div class="card"><canvas id="chart"></canvas></div>

  <div class="cols">
    <div>
      <div class="section-title">Today's signals</div>
      <div id="signals"></div>
    </div>
    <div>
      <div class="section-title">Open positions</div>
      <div id="open"></div>
    </div>
  </div>

  <div class="section-title">Model ranking · top 15 by P(long)</div>
  <div id="scores"></div>

  <div class="section-title">Recent closed trades</div>
  <div id="trades"></div>

  <div class="foot" id="foot"></div>

<script>
const F = n => (n===null||n===undefined) ? "—" : n.toFixed(2);
const pct = n => (n===null||n===undefined) ? "—" : (n>=0?"+":"")+n.toFixed(2)+"%";
const cls = n => n>=0 ? "pos" : "neg";

async function load() {
  let d;
  try {
    d = await (await fetch("dashboard.json?_="+Date.now())).json();
  } catch(e) {
    document.getElementById("meta").textContent = "no data yet — run the daily job once";
    return;
  }

  const b = d.barrier;
  document.getElementById("barrier").textContent =
    `+${(b.up*100).toFixed(0)}% before −${(b.down*100).toFixed(0)}% within ${b.horizon}d · P* ${d.p_star.toFixed(3)}`;
  document.getElementById("meta").innerHTML =
    `signal date <b>${d.signal_date||"—"}</b><br>updated ${new Date(d.updated_at).toLocaleString()}`;

  const e = d.equity, st = d.stats;
  const kpis = [
    ["Equity", "$"+F(e.current), e.total_return_pct>=0?"pos":"neg", pct(e.total_return_pct)],
    ["Sharpe (est)", e.sharpe_est===null?"—":F(e.sharpe_est), e.sharpe_est>=0?"pos":"neg", ""],
    ["Max drawdown", pct(e.max_drawdown_pct), "neg", ""],
    ["Win rate", st.win_rate_pct===null?"—":st.win_rate_pct+"%", "", `${st.n_closed} closed · ${st.n_open} open`],
  ];
  document.getElementById("kpis").innerHTML = kpis.map(k=>`
    <div class="card">
      <div class="label">${k[0]}</div>
      <div class="value ${k[2]}">${k[1]}</div>
      <div class="label ${k[2]}" style="margin-top:2px">${k[3]}</div>
    </div>`).join("");

  drawChart(d.equity_curve || []);

  document.getElementById("signals").innerHTML = d.todays_signals?.length ? table(
    ["Ticker","Side","P"],
    d.todays_signals.map(s=>[
      s.ticker, `<span class="tag ${s.side}">${s.side}</span>`,
      `<span class="pnum">${s.p.toFixed(3)}</span>`
    ]), [0,0,1]
  ) : `<div class="empty">No signals cleared P* today.</div>`;

  document.getElementById("open").innerHTML = d.open_positions?.length ? table(
    ["Ticker","Side","Entry","Days","P"],
    d.open_positions.map(p=>[
      p.ticker, `<span class="tag ${p.side}">${p.side}</span>`,
      `<span class="pnum">${F(p.entry_price)}</span>`, p.days_held,
      `<span class="pnum">${p.p_at_entry.toFixed(3)}</span>`
    ]), [0,0,1,1,1]
  ) : `<div class="empty">No open positions.</div>`;

  document.getElementById("scores").innerHTML = table(
    ["Ticker","P(long)","P(short)"],
    (d.top_scores||[]).map(s=>[
      s.ticker,
      `<span class="pnum ${s.p_long>d.p_star?'pos':''}">${s.p_long.toFixed(3)}</span>`,
      `<span class="pnum ${s.p_short>d.p_star?'neg':''}">${s.p_short.toFixed(3)}</span>`
    ]), [0,1,1]
  );

  document.getElementById("trades").innerHTML = d.recent_trades?.length ? table(
    ["Ticker","Side","In","Out","Days","Exit","Net"],
    d.recent_trades.map(t=>[
      t.ticker, `<span class="tag ${t.side}">${t.side}</span>`,
      t.entry_date, t.exit_date, t.days_held,
      `<span class="tag ${t.reason}">${t.reason}</span>`,
      `<span class="pnum ${cls(t.net_pct)}">${pct(t.net_pct)}</span>`
    ]), [0,0,0,0,1,0,1]
  ) : `<div class="empty">No closed trades yet.</div>`;

  document.getElementById("foot").innerHTML =
    `Model trained ${d.model_trained_at?new Date(d.model_trained_at).toLocaleDateString():"—"} · `+
    `Virtual capital, realistic fills (entry at open+slip, stops slip through gaps, commission+spread+borrow). `+
    `Paper trading only — not investment advice.`;
}

function table(headers, rows, align) {
  const th = headers.map((h,i)=>`<th style="text-align:${align[i]?'right':'left'}">${h}</th>`).join("");
  const tr = rows.map(r=>"<tr>"+r.map((c,i)=>`<td style="text-align:${align[i]?'right':'left'}">${c}</td>`).join("")+"</tr>").join("");
  return `<table><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table>`;
}

function drawChart(curve) {
  const cv = document.getElementById("chart");
  const dpr = window.devicePixelRatio || 1;
  const W = cv.clientWidth, H = 220;
  cv.width = W*dpr; cv.height = H*dpr;
  const ctx = cv.getContext("2d"); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  if (curve.length < 2) {
    ctx.fillStyle = "#6b7885"; ctx.font = "12px monospace";
    ctx.fillText("accumulating equity history…", 12, H/2);
    return;
  }
  const vals = curve.map(p=>p.equity);
  const min = Math.min(...vals), max = Math.max(...vals);
  const pad = (max-min)*0.1 || 1;
  const lo = min-pad, hi = max+pad;
  const x = i => 40 + (W-55) * i/(curve.length-1);
  const y = v => 15 + (H-40) * (1-(v-lo)/(hi-lo));

  // gridlines + labels
  ctx.strokeStyle = "#1a222b"; ctx.fillStyle="#6b7885"; ctx.font="10px monospace";
  for (let g=0; g<=4; g++) {
    const v = lo + (hi-lo)*g/4, yy = y(v);
    ctx.beginPath(); ctx.moveTo(40,yy); ctx.lineTo(W-15,yy); ctx.stroke();
    ctx.fillText("$"+(v/1000).toFixed(1)+"k", 2, yy+3);
  }
  // start-equity reference line
  const start = curve[0].equity;
  ctx.strokeStyle = "#3a3020"; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(40,y(start)); ctx.lineTo(W-15,y(start)); ctx.stroke();
  ctx.setLineDash([]);

  // equity line, colored by above/below start
  ctx.lineWidth = 1.6;
  ctx.strokeStyle = vals[vals.length-1] >= start ? "#3fb98a" : "#e8654f";
  ctx.beginPath();
  curve.forEach((p,i)=> i?ctx.lineTo(x(i),y(p.equity)):ctx.moveTo(x(i),y(p.equity)));
  ctx.stroke();

  // area fill
  const grad = ctx.createLinearGradient(0,15,0,H-25);
  const c = vals[vals.length-1] >= start ? "63,185,138" : "232,101,79";
  grad.addColorStop(0, `rgba(${c},0.18)`); grad.addColorStop(1,`rgba(${c},0)`);
  ctx.lineTo(x(curve.length-1), H-25); ctx.lineTo(x(0), H-25); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();
}

load();
setInterval(load, 5*60*1000);   // refresh every 5 min
window.addEventListener("resize", load);
</script>
</body>
</html>
