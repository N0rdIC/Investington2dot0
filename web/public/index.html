<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barrier Signal · Paper Desk</title>
<style>
  :root {
    --bg: #0a0e12;
    --panel: #11171d;
    --panel-2: #161d25;
    --line: #232d38;
    --ink: #d4dce4;
    --dim: #6b7885;
    --long: #3fb98a;      /* green for longs */
    --short: #e8654f;     /* vermilion for shorts */
    --accent: #e2b93b;    /* amber terminal accent */
    --grid: #1a222b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "SF Mono", "JetBrains Mono", "Consolas", ui-monospace, monospace;
    font-size: 13px; line-height: 1.5;
    padding: 20px; max-width: 1200px; margin: 0 auto;
  }
  .head {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 1px solid var(--line); padding-bottom: 14px; margin-bottom: 20px;
    flex-wrap: wrap; gap: 8px;
  }
  .title { font-size: 18px; letter-spacing: 0.5px; font-weight: 600; }
  .title .blink { color: var(--accent); }
  .meta { color: var(--dim); font-size: 11px; text-align: right; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 4px; padding: 14px;
  }
  .card .label { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; }
  .card .value { font-size: 22px; margin-top: 4px; font-weight: 600; }
  .pos { color: var(--long); } .neg { color: var(--short); }
  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--accent); margin: 24px 0 10px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { color: var(--dim); text-align: right; font-weight: 500; padding: 6px 10px;
       border-bottom: 1px solid var(--line); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  th:first-child, td:first-child { text-align: left; }
  td { padding: 6px 10px; border-bottom: 1px solid var(--grid); }
  tr:hover td { background: var(--panel-2); }
  .tag { padding: 1px 7px; border-radius: 3px; font-size: 10px; font-weight: 600;
         text-transform: uppercase; letter-spacing: 0.5px; }
  .tag.long { background: rgba(63,185,138,0.15); color: var(--long); }
  .tag.short { background: rgba(232,101,79,0.15); color: var(--short); }
  .tag.profit { background: rgba(63,185,138,0.12); color: var(--long); }
  .tag.stop { background: rgba(232,101,79,0.12); color: var(--short); }
  .tag.time { background: rgba(107,120,133,0.15); color: var(--dim); }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 820px) { .grid { grid-template-columns: repeat(2,1fr); } .cols { grid-template-columns: 1fr; } }
  #chart { width: 100%; height: 220px; display: block; }
  .barbadge { font-size: 11px; color: var(--dim); }
  .empty { color: var(--dim); padding: 20px; text-align: center; }
  .foot { color: var(--dim); font-size: 10px; margin-top: 30px; border-top: 1px solid var(--line);
          padding-top: 12px; line-height: 1.7; }
  .pnum { font-variant-numeric: tabular-nums; }
  .dim { color: var(--dim); }
  .ambig { color: var(--accent); opacity: 0.75; }
  .glpmain { padding: 16px 18px; }
  .formula {
    color: var(--accent); font-size: 12px; letter-spacing: 0.5px;
    padding-bottom: 12px; margin-bottom: 14px; border-bottom: 1px solid var(--line);
  }
  .glprow { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
  .glprow .value { font-size: 20px; font-weight: 600; margin: 2px 0; }
  .verdict {
    margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line);
    font-size: 12px;
  }
  @media (max-width: 820px) { .glprow { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>
  <div class="head">
    <div>
      <div class="title">BARRIER SIGNAL <span class="blink">▮</span> PAPER DESK</div>
      <div class="barbadge" id="barrier">—</div>
    </div>
    <div style="text-align:right">
      <a href="backtest.html" style="color:var(--accent);text-decoration:none;font-size:11px;
         border:1px solid var(--accent);padding:5px 12px;border-radius:4px;display:inline-block">
         backtest log →</a>
      <div class="meta" id="meta" style="margin-top:8px">loading…</div>
    </div>
  </div>

  <div class="grid" id="kpis"></div>

  <div class="section-title">Equity (virtual, realistic fills)</div>
  <div class="card"><canvas id="chart"></canvas></div>

  <div class="cols">
    <div>
      <div class="section-title">Today's signals</div>
      <div id="signals"></div>
    </div>
    <div>
      <div class="section-title">Open positions</div>
      <div id="open"></div>
    </div>
  </div>

  <div class="section-title">Model quality · expected vs realised</div>
  <div id="modelq"></div>

  <div class="section-title">Realised edge · G / L / P from closed trades</div>
  <div id="glp"></div>

  <div class="cols">
    <div>
      <div class="section-title">Model ranking · calibrated P(win)</div>
      <div id="scoresLong"></div>
    </div>
    <div>
      <div class="section-title">Threshold sweep · precision vs volume</div>
      <div id="sweep"></div>
    </div>
  </div>

  <div class="section-title">Recent closed trades</div>
  <div id="trades"></div>

  <div class="foot" id="foot"></div>

<script>
const F = n => (n===null||n===undefined) ? "—" : n.toFixed(2);
const pct = n => (n===null||n===undefined) ? "—" : (n>=0?"+":"")+n.toFixed(2)+"%";
const cls = n => n>=0 ? "pos" : "neg";

async function load() {
  let d;
  try {
    d = await (await fetch("dashboard.json?_="+Date.now())).json();
  } catch(e) {
    document.getElementById("meta").textContent = "no data yet — run the daily job once";
    return;
  }

  const b = d.barrier;
  document.getElementById("barrier").textContent =
    `+${(b.up*100).toFixed(0)}% before −${(b.down*100).toFixed(0)}% within ${b.horizon}d`
    + (d.gate_long_pct ? ` · gate E ≥ ${d.gate_long_pct.toFixed(2)}%` : "");
  document.getElementById("meta").innerHTML =
    `signal date <b>${d.signal_date||"—"}</b><br>updated ${new Date(d.updated_at).toLocaleString()}`;

  const e = d.equity, st = d.stats;
  const kpis = [
    ["Equity", "$"+F(e.current), e.total_return_pct>=0?"pos":"neg", pct(e.total_return_pct)],
    ["Sharpe (est)", e.sharpe_est===null?"—":F(e.sharpe_est), e.sharpe_est>=0?"pos":"neg", ""],
    ["Max drawdown", pct(e.max_drawdown_pct), "neg", ""],
    ["Win rate", st.win_rate_pct===null?"—":st.win_rate_pct+"%", "", `${st.n_closed} closed · ${st.n_open} open`],
  ];
  document.getElementById("kpis").innerHTML = kpis.map(k=>`
    <div class="card">
      <div class="label">${k[0]}</div>
      <div class="value ${k[2]}">${k[1]}</div>
      <div class="label ${k[2]}" style="margin-top:2px">${k[3]}</div>
    </div>`).join("");

  drawChart(d.equity_curve || []);

  document.getElementById("signals").innerHTML = d.todays_signals?.length ? table(
    ["Ticker","Side","σ 6m","Ref","Target","Stop","Size","E"],
    d.todays_signals.map(s=>[
      s.ticker, `<span class="tag ${s.side}">${s.side}</span>`,
      sigCell(s.sigma_d_pct, s.barrier_sigmas),
      `<span class="pnum dim">${s.ref_price!==undefined?F(s.ref_price):"—"}</span>`,
      `<span class="pnum pos">${s.target_price!==undefined?F(s.target_price):"—"}</span>`,
      `<span class="pnum neg">${s.stop_price!==undefined?F(s.stop_price):"—"}</span>`,
      `<span class="pnum dim">$${d.position_size?Number(d.position_size).toLocaleString():"—"}</span>`,
      `<span class="pnum ${s.E_pct>0?'pos':'neg'}">${s.E_pct!=null?(s.E_pct>0?"+":"")+s.E_pct.toFixed(2)+"%":"—"}</span>`
    ]), [0,0,1,1,1,1,1,1]
  ) : `<div class="empty">No signals passed both the expectancy and direction gates today.</div>`;

  document.getElementById("open").innerHTML = d.open_positions?.length ? table(
    ["Ticker","Side","Entry","Target","Stop","Size","Shares","Left"],
    d.open_positions.map(p=>[
      p.ticker, `<span class="tag ${p.side}">${p.side}</span>`,
      `<span class="pnum">${F(p.entry_price)}</span>`,
      `<span class="pnum pos">${p.target_price!==undefined?F(p.target_price):"—"}</span>`,
      `<span class="pnum neg">${p.stop_price!==undefined?F(p.stop_price):"—"}</span>`,
      `<span class="pnum dim">$${p.size?Number(p.size).toLocaleString():"—"}</span>`,
      `<span class="pnum dim">${p.shares!=null?F(p.shares,1):"—"}</span>`,
      `<span class="pnum dim">${p.days_left!==undefined?p.days_left+"d":p.days_held}</span>`
    ]), [0,0,1,1,1,1,1,1]
  ) : `<div class="empty">No open positions.</div>`;

  const thr = d.threshold;
  document.getElementById("scoresLong").innerHTML = table(
    ["Ticker","P(win) cal","raw","vs thresh"],
    (d.top_longs||[]).map(s=>[
      s.ticker, sigCell(s.sigma_d_pct, null),
      `<span class="pnum ${thr!=null && s.p>=thr?'pos':'dim'}">${s.p.toFixed(3)}</span>`,
      `<span class="pnum dim">${s.p_raw!=null?s.p_raw.toFixed(3):"—"}</span>`,
      thr==null ? `<span class="dim">—</span>`
        : `<span class="pnum ${s.p>=thr?'pos':'neg'}">${s.p>=thr?"PASS":((s.p-thr)*100).toFixed(1)+"pp"}</span>`
    ]), [0,1,1,1]
  );

  const sw = d.sweep;
  document.getElementById("sweep").innerHTML = (sw && sw.sweep && sw.sweep.length) ? table(
    ["Thresh","Precision","Edge","/year","E/trade"],
    sw.sweep.map(r=>{
      const isRec = sw.recommended && r.threshold===sw.recommended.threshold;
      return [
        `<span class="pnum ${isRec?'':'dim'}">${r.threshold.toFixed(3)}${isRec?" ◄":""}</span>`,
        `<span class="pnum">${r.precision_pct.toFixed(1)}%</span>`,
        `<span class="pnum ${r.edge_vs_pstar_pp>0?'pos':'neg'}">${r.edge_vs_pstar_pp>0?"+":""}${r.edge_vs_pstar_pp.toFixed(1)}pp</span>`,
        `<span class="pnum dim">${r.per_year.toFixed(0)}</span>`,
        `<span class="pnum ${r.E_trade_pct>0?'pos':'neg'}">${r.E_trade_pct>0?"+":""}${r.E_trade_pct.toFixed(2)}%</span>`
      ];
    }), [1,1,1,1,1]
  ) : `<div class="empty">No sweep yet — run retrain-model.</div>`;

  renderGLP(d);
  renderModelQ(d);

  document.getElementById("trades").innerHTML = d.recent_trades?.length ? table(
    ["Ticker","Side","In","Out","Days","Exit","Net"],
    d.recent_trades.map(t=>[
      t.ticker, `<span class="tag ${t.side}">${t.side}</span>`,
      t.entry_date, t.exit_date, t.days_held,
      `<span class="tag ${t.reason}">${t.reason}</span>`,
      `<span class="pnum ${cls(t.net_pct)}">${pct(t.net_pct)}</span>`
    ]), [0,0,0,0,1,0,1]
  ) : `<div class="empty">No closed trades yet.</div>`;

  document.getElementById("foot").innerHTML =
    `Model trained ${d.model_trained_at?new Date(d.model_trained_at).toLocaleDateString():"—"} · `+
    `Virtual capital, realistic fills (entry at open+slip, stops slip through gaps, commission+spread+borrow). `+
    `Paper trading only — not investment advice.`;
}

function renderGLP(d) {
  const g = d.glp;
  const el = document.getElementById("glp");
  if (!g) {
    el.innerHTML = `<div class="empty">No closed trades yet — G / L / P appear once positions hit their barriers (up to ${d.barrier.horizon} days).</div>`;
    return;
  }
  const edge = g.edge_vs_breakeven_pct;
  const edgeCls = edge===null ? "" : (edge>0 ? "pos" : "neg");
  const verdict = edge===null ? "—"
    : (edge>0 ? `profitable: P beats breakeven by ${edge.toFixed(1)}pp`
              : `losing: P is ${Math.abs(edge).toFixed(1)}pp below breakeven`);

  // realised vs target comparison — slippage shows up here
  const gSlip = (g.G_realized_pct - g.G_target_pct).toFixed(2);
  const lSlip = (g.L_realized_pct - g.L_target_pct).toFixed(2);

  el.innerHTML = `
  <div class="glpwrap">
    <div class="card glpmain">
      <div class="formula">E = P·G − (1−P)·L − c</div>
      <div class="glprow">
        <div><div class="label">P realised</div><div class="value">${g.P_realized_pct}%</div>
             <div class="label">breakeven ${g.breakeven_P_pct ?? "—"}%</div></div>
        <div><div class="label">G realised</div><div class="value pos">+${g.G_realized_pct}%</div>
             <div class="label">target +${g.G_target_pct}% (${gSlip>0?"+":""}${gSlip})</div></div>
        <div><div class="label">L realised</div><div class="value neg">−${g.L_realized_pct}%</div>
             <div class="label">target −${g.L_target_pct}% (${lSlip>0?"+":""}${lSlip})</div></div>
        <div><div class="label">Expectancy / trade</div>
             <div class="value ${g.expectancy_pct>=0?'pos':'neg'}">${pct(g.expectancy_pct)}</div>
             <div class="label">over ${g.n_trades} trades</div></div>
      </div>
      <div class="verdict ${edgeCls}">${verdict}</div>
    </div>
  </div>
  <div class="cols" style="margin-top:12px">
    <div>${table(["Exit","N","% of trades","Avg net"],
      Object.entries(g.by_reason||{}).map(([k,v])=>[
        `<span class="tag ${k}">${k}</span>`, v.n, v.pct_of_trades+"%",
        `<span class="pnum ${cls(v.avg_net_pct)}">${pct(v.avg_net_pct)}</span>`]),
      [0,1,1,1])}</div>
    <div>${table(["Side","N","Win rate","Avg net"],
      Object.entries(g.by_side||{}).map(([k,v])=>[
        `<span class="tag ${k}">${k}</span>`, v.n, v.win_rate_pct+"%",
        `<span class="pnum ${cls(v.avg_net_pct)}">${pct(v.avg_net_pct)}</span>`]),
      [0,1,1,1])}</div>
  </div>`;
}

function renderModelQ(d) {
  const el = document.getElementById("modelq");
  const h = d.training_history || [];
  if (!h.length) {
    el.innerHTML = `<div class="empty">No training metrics yet — run the retrain-model workflow.</div>`;
    return;
  }
  const cur = h[h.length-1], prev = h.length>1 ? h[h.length-2] : null;
  const dlt = (k,f=2) => {
    if (!prev || prev[k]==null || cur[k]==null) return "";
    const v = cur[k]-prev[k];
    return ` <span class="${v>=0?'pos':'neg'}" style="font-size:10px">(${v>=0?"+":""}${v.toFixed(f)})</span>`;
  };
  const realP = d.glp ? d.glp.P_realized_pct : null;
  const expP  = cur.win_rate_pct;
  const gap   = (expP!=null && realP!=null) ? (realP-expP) : null;

  el.innerHTML = `
  <div class="card glpmain">
    <div class="formula">E = p_win·G − p_stop·L + p_timeout·r_timeout − c</div>
    <div class="glprow">
      <div><div class="label">Expected win rate</div>
           <div class="value">${expP!=null?expP.toFixed(1)+"%":"—"}${dlt('win_rate_pct')}</div>
           <div class="label">true breakeven ${cur.true_breakeven_pct ?? "—"}%</div></div>
      <div><div class="label">Realised (live)</div>
           <div class="value ${realP!=null&&expP!=null?(realP>=expP?'pos':'neg'):''}">${realP!=null?realP+"%":"—"}</div>
           <div class="label">${gap!=null?(gap>=0?"+":"")+gap.toFixed(1)+"pp vs expected":"awaiting trades"}</div></div>
      <div><div class="label">AUC (win)</div>
           <div class="value">${cur.auc_long!=null?cur.auc_long.toFixed(3):"—"}${dlt('auc_long',3)}</div>
           <div class="label">0.50 = no skill</div></div>
      <div><div class="label">E realised / trade</div>
           <div class="value ${cur.E_realised_pct>=0?'pos':'neg'}">${cur.E_realised_pct!=null?pct(cur.E_realised_pct):"—"}</div>
           <div class="label">~${cur.signals_per_year!=null?Math.round(cur.signals_per_year):"—"} signals/yr</div></div>
    </div>
    <div class="verdict">
      horizon ${cur.horizon ?? "—"}d · timeouts ${cur.timeout_pct ?? "—"}%
      ${cur.timeout_pct>25?' <span class="neg">— high: barrier may be too wide for the horizon</span>':''}
      · <a href="backtest.html" style="color:var(--accent)">full backtest log →</a>
    </div>
  </div>`;
}

function sigCell(sd, bs) {
  if (sd==null) return `<span class="dim">—</span>`;
  // barrier_sigmas = how many sigma the target is over the horizon.
  // Measured timeout rates: 0.63 sigma -> 15%, 0.79 -> 26%, 0.84 -> 30%,
  // 1.05 -> 44%. So flag anything above ~0.9.
  const weak = bs!=null && bs > 0.9;
  return `<span class="pnum ${weak?'ambig':''}" ${weak?'title="barrier is a long reach for this name — expect timeouts"':''}>`
       + `${sd.toFixed(1)}%${bs!=null?` <span style="opacity:.6">${bs.toFixed(1)}σ</span>`:""}${weak?" ⚠":""}</span>`;
}

function tiltCell(t) {
  if (t===undefined || t===null) return `<span class="dim">—</span>`;
  // low |tilt| = model says "big move coming" but not which way = volatility,
  // not direction. Flag it so you can see the contradiction.
  const amb = Math.abs(t) < 0.10;
  return `<span class="pnum ${amb?'ambig':(t>0?'pos':'neg')}" ${amb?'title="ambiguous: both barriers likely -- volatility, not direction"':''}>`
       + `${t>=0?"+":""}${t.toFixed(3)}${amb?" ⚠":""}</span>`;
}

function table(headers, rows, align) {
  const th = headers.map((h,i)=>`<th style="text-align:${align[i]?'right':'left'}">${h}</th>`).join("");
  const tr = rows.map(r=>"<tr>"+r.map((c,i)=>`<td style="text-align:${align[i]?'right':'left'}">${c}</td>`).join("")+"</tr>").join("");
  return `<table><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table>`;
}

function drawChart(curve) {
  const cv = document.getElementById("chart");
  const dpr = window.devicePixelRatio || 1;
  const W = cv.clientWidth, H = 220;
  cv.width = W*dpr; cv.height = H*dpr;
  const ctx = cv.getContext("2d"); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  if (curve.length < 2) {
    ctx.fillStyle = "#6b7885"; ctx.font = "12px monospace";
    ctx.fillText("accumulating equity history…", 12, H/2);
    return;
  }
  const vals = curve.map(p=>p.equity);
  const min = Math.min(...vals), max = Math.max(...vals);
  const pad = (max-min)*0.1 || 1;
  const lo = min-pad, hi = max+pad;
  const x = i => 40 + (W-55) * i/(curve.length-1);
  const y = v => 15 + (H-40) * (1-(v-lo)/(hi-lo));

  // gridlines + labels
  ctx.strokeStyle = "#1a222b"; ctx.fillStyle="#6b7885"; ctx.font="10px monospace";
  for (let g=0; g<=4; g++) {
    const v = lo + (hi-lo)*g/4, yy = y(v);
    ctx.beginPath(); ctx.moveTo(40,yy); ctx.lineTo(W-15,yy); ctx.stroke();
    ctx.fillText("$"+(v/1000).toFixed(1)+"k", 2, yy+3);
  }
  // start-equity reference line
  const start = curve[0].equity;
  ctx.strokeStyle = "#3a3020"; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(40,y(start)); ctx.lineTo(W-15,y(start)); ctx.stroke();
  ctx.setLineDash([]);

  // equity line, colored by above/below start
  ctx.lineWidth = 1.6;
  ctx.strokeStyle = vals[vals.length-1] >= start ? "#3fb98a" : "#e8654f";
  ctx.beginPath();
  curve.forEach((p,i)=> i?ctx.lineTo(x(i),y(p.equity)):ctx.moveTo(x(i),y(p.equity)));
  ctx.stroke();

  // area fill
  const grad = ctx.createLinearGradient(0,15,0,H-25);
  const c = vals[vals.length-1] >= start ? "63,185,138" : "232,101,79";
  grad.addColorStop(0, `rgba(${c},0.18)`); grad.addColorStop(1,`rgba(${c},0)`);
  ctx.lineTo(x(curve.length-1), H-25); ctx.lineTo(x(0), H-25); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();
}

load();
setInterval(load, 5*60*1000);   // refresh every 5 min
window.addEventListener("resize", load);
</script>
</body>
</html>
