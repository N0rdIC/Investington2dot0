name: retrain-model

# Manual only. You control exactly when the model changes, so what trades is
# always something you chose to deploy -- no silent drift from the validated
# version. Click "Run workflow" in the Actions tab to retrain.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "retrain" to confirm you want to replace the live model'
        required: true
        default: ""

permissions:
  contents: write

jobs:
  train:
    if: ${{ github.event.inputs.confirm == 'retrain' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Train models
        working-directory: scripts
        run: python train.py

      - name: Commit new model
        run: |
          git config user.name  "signal-bot"
          git config user.email "signal-bot@users.noreply.github.com"
          git add model/model_long.json model/model_short.json model/meta.json
          if git diff --staged --quiet; then
            echo "No model changes."
          else
            git commit -m "retrain model $(date -u +%Y-%m-%d)"
            git push
          fi
